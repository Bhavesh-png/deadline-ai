services:
  # FastAPI Backend Service
  - type: web
    name: deadlineai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: ALLOWED_ORIGINS
        value: https://deadlineai.onrender.com
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

  # React Frontend Static Hosting
  - type: static
    name: deadlineai-frontend
    rootDir: frontend
    buildCommand: npm install --legacy-peer-deps && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        path: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://deadlineai-backend.onrender.com
