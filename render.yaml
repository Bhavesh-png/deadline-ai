services:
  # FastAPI Backend Service
  - type: web
    name: deadlineai-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://deadlineai-41435.web.app
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: GEMINI_API_KEY
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
